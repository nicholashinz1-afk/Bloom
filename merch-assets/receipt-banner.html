<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaidGently — Receipt Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; font-family: sans-serif; color: #888; }
  .label { font-size: 13px; }
  canvas { border: 1px solid #333; border-radius: 4px; }
  .btn { padding: 10px 20px; background: #1c2e20; color: #a8c5ab; border: 1px solid #2a4a30; border-radius: 6px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<div class="label">Etsy order receipt banner — 760x100px</div>
<canvas id="banner" width="760" height="100" style="width:100%;max-width:760px;height:auto;"></canvas>
<button class="btn" id="dl">Download PNG</button>

<script>
async function render() {
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 400));

  const c = document.getElementById('banner');
  const ctx = c.getContext('2d');
  const W = 760, H = 100;

  // Background
  ctx.fillStyle = '#1c2e20';
  ctx.fillRect(0, 0, W, H);

  // Subtle leaf shapes
  for (let i = 0; i < 15; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const size = 8 + Math.random() * 25;
    const angle = Math.random() * Math.PI * 2;
    const alpha = 0.04 + Math.random() * 0.06;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -size / 2);
    ctx.bezierCurveTo(size * 0.4, -size * 0.2, size * 0.3, size * 0.2, 0, size / 2);
    ctx.bezierCurveTo(-size * 0.3, size * 0.2, -size * 0.4, -size * 0.2, 0, -size / 2);
    ctx.fillStyle = `rgba(58,90,46,${alpha})`;
    ctx.fill();
    ctx.restore();
  }

  // "stay." left side, amber
  ctx.save();
  ctx.translate(80, H * 0.5);
  ctx.font = '400 36px Fraunces';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(212,173,106,0.85)';
  ctx.fillText('stay.', 0, 0);
  ctx.restore();

  // Divider line
  ctx.strokeStyle = 'rgba(232,224,208,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(160, 20);
  ctx.lineTo(160, 80);
  ctx.stroke();

  // "SaidGently — one word at a time" right side
  ctx.save();
  ctx.translate(460, H * 0.5);
  ctx.font = '300 20px Fraunces';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(232,224,208,0.6)';
  ctx.fillText('SaidGently  \u2014  one word at a time', 0, 0);
  ctx.restore();

  document.getElementById('dl').onclick = () => {
    const link = document.createElement('a');
    link.download = 'saidgently-receipt-banner.png';
    link.href = c.toDataURL('image/png');
    link.click();
  };
}
render();
</script>

</body>
</html>
