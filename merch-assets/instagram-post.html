<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaidGently — Instagram Post</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; font-family: sans-serif; color: #888; }
  .label { font-size: 13px; }
  canvas { border-radius: 4px; border: 1px solid #333; }
  .btn { padding: 10px 20px; background: #1c2e20; color: #a8c5ab; border: 1px solid #2a4a30; border-radius: 6px; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<div class="label">Instagram post — 1080x1080px</div>
<canvas id="post" width="1080" height="1080" style="width:360px;height:360px;"></canvas>
<button class="btn" id="dl">Download PNG</button>

<script>
async function render() {
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 400));

  const c = document.getElementById('post');
  const ctx = c.getContext('2d');
  const W = 1080, H = 1080;

  // Background
  ctx.fillStyle = '#1c2e20';
  ctx.fillRect(0, 0, W, H);

  // Depth variation
  for (let i = 0; i < 10; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 100 + Math.random() * 300;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(28,50,30,0.2)');
    g.addColorStop(1, 'rgba(22,46,26,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // Leaf shapes
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const size = 10 + Math.random() * 50;
    const angle = Math.random() * Math.PI * 2;
    const alpha = 0.04 + Math.random() * 0.08;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -size / 2);
    ctx.bezierCurveTo(size * 0.4, -size * 0.2, size * 0.3, size * 0.2, 0, size / 2);
    ctx.bezierCurveTo(-size * 0.3, size * 0.2, -size * 0.4, -size * 0.2, 0, -size / 2);
    ctx.fillStyle = `rgba(58,90,46,${alpha})`;
    ctx.fill();
    ctx.restore();
  }

  // Warm center glow
  const glow = ctx.createRadialGradient(W * 0.5, H * 0.42, 0, W * 0.5, H * 0.42, 400);
  glow.addColorStop(0, 'rgba(212,173,106,0.08)');
  glow.addColorStop(1, 'rgba(22,46,26,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // "stay." large, centered, amber
  ctx.save();
  ctx.translate(W * 0.5, H * 0.42);
  ctx.font = '400 160px Fraunces';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(212,173,106,0.9)';
  ctx.fillText('stay.', 0, 0);
  ctx.restore();

  // Thin divider line
  ctx.strokeStyle = 'rgba(232,224,208,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W * 0.3, H * 0.58);
  ctx.lineTo(W * 0.7, H * 0.58);
  ctx.stroke();

  // Mission line
  ctx.save();
  ctx.translate(W * 0.5, H * 0.66);
  ctx.font = '300 28px Fraunces';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(232,224,208,0.65)';
  ctx.fillText('100% of profits fund', 0, -18);
  ctx.fillText('free mental health tools', 0, 18);
  ctx.restore();

  // Shop name at bottom
  ctx.save();
  ctx.translate(W * 0.5, H * 0.85);
  ctx.font = '300 28px Fraunces';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(232,224,208,0.5)';
  ctx.fillText('SaidGently', 0, 0);
  ctx.restore();

  document.getElementById('dl').onclick = () => {
    const link = document.createElement('a');
    link.download = 'saidgently-instagram-post.png';
    link.href = c.toDataURL('image/png');
    link.click();
  };
}
render();
</script>

</body>
</html>
